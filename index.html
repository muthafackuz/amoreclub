<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmoreClub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0f;
color:white;
height:100vh;
overflow:hidden;
}

/* TOP BAR */

.top-bar{
height:80px;
background:#111827;
border-bottom:2px solid #ff0077;

display:flex;
align-items:center;
justify-content:center;

position:relative;
}

.dj-player{

width:700px;
height:60px;

background:#18181f;

border:1px solid #333;
border-radius:12px;

overflow:hidden;

box-shadow:
0 0 15px rgba(255,0,119,0.2);

}

.player-title{
color:#00e5ff;
font-weight:bold;
}

.player-controls{
display:flex;
gap:10px;
}

.player-btn{
background:#222;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.player-btn:hover{
background:#ff0077;
}

/* MAIN */

.main{
display:flex;
height:calc(100vh - 80px);
}

/* LEFT */

.left-panel{
width:40%;
padding:20px;
}

/* DANCEFLOOR */

.dancefloor-box{
height:100%;

background:#111827;

border-radius:18px;

border:1px solid #222;

padding:15px;

position:relative;

overflow:hidden;

box-shadow:
0 0 30px rgba(0,0,0,0.4);
}

.box-title{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
color:#ff0077;
}

.dancefloor{
height:90%;

background:
linear-gradient(45deg,#111 25%,#191919 25%,#191919 50%,#111 50%,#111 75%,#191919 75%,#191919);

background-size:40px 40px;

border-radius:15px;

position:relative;
overflow:hidden;
}

/* RIGHT */

.right-panel{
width:60%;
padding:20px;

display:flex;
flex-direction:column;
gap:20px;
}

/* AUTH */

.auth-box{
height:120px;

background:#111827;

border-radius:18px;

border:1px solid #222;

padding:15px;
}

.auth-buttons{
display:flex;
gap:15px;
margin-top:20px;
}

.auth-btn{
background:#1f2937;
border:none;
padding:12px 18px;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.auth-btn:hover{
background:#ff0077;
}

/* CHAT */

.chat-box{
flex:1;

background:#111827;

border-radius:18px;

border:1px solid #222;

padding:15px;

display:flex;
flex-direction:column;
}

.chat-messages{
flex:1;

background:#0d1117;

border-radius:12px;

padding:10px;

overflow-y:auto;

margin-bottom:15px;
}

.message{
margin-bottom:10px;
}

.message-user{
color:#00e5ff;
font-weight:bold;
}

.chat-input-area{
display:flex;
gap:10px;
}

.chat-input{
flex:1;

background:#1f2937;

border:none;

padding:12px;

border-radius:10px;

color:white;
}

.send-btn{
background:#ff0077;
border:none;
padding:12px 18px;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* MODALS */

.modal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.8);

justify-content:center;
align-items:center;

z-index:9999;

}

.modal-content{

width:400px;

background:#111827;

border-radius:20px;

padding:30px;

display:flex;
flex-direction:column;
gap:15px;

border:1px solid #333;

box-shadow:
0 0 30px rgba(255,0,119,0.3);

}

.modal-content h2{

color:#ff0077;
text-align:center;

}

.modal-input{

background:#1f2937;

border:none;

padding:14px;

border-radius:10px;

color:white;

font-size:16px;

}

.modal-btn{

background:#ff0077;

border:none;

padding:14px;

border-radius:10px;

color:white;

font-weight:bold;

cursor:pointer;

font-size:16px;

}

.close-btn{

background:#222;

border:none;

padding:12px;

border-radius:10px;

color:white;

cursor:pointer;

}

/* CUSTOM MESSAGE */

.custom-alert{
position:fixed;
top:20px;
right:20px;
background:#111827;
border:1px solid #ff0077;
padding:15px 20px;
border-radius:12px;
z-index:99999;
font-weight:bold;
display:none;
box-shadow:0 0 20px rgba(255,0,119,0.3);
}

</style>
</head>

<body>

<div id="customAlert" class="custom-alert"></div>

<!-- TOP BAR -->

<div class="top-bar">

<div class="dj-player">

<div id="youtubePlayer"></div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="left-panel">

<div class="dancefloor-box">

<div class="box-title">
🕺 DANCEFLOOR
</div>
<button
class="auth-btn"
id="danceBtn"
style="margin-bottom:15px;"
onclick="toggleDance()"
>
🕺 СКОЧИ НА ДАНСИНГА
</button>
<div class="dancefloor" id="dancefloor">

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right-panel">

<!-- AUTH -->

<div class="auth-box">

<div class="box-title">
👤 PROFILE
</div>

<div class="auth-buttons" id="authButtons">

<button
class="auth-btn"
onclick="openRegisterModal()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="auth-btn"
onclick="openLoginModal()"
>
ВХОД
</button>

</div>

</div>

<!-- CHAT -->

<div class="chat-box">

<div class="box-title">
💬 CLUB CHAT
</div>

<div class="chat-messages" id="chatMessages">

<div class="message">
<span class="message-user">System:</span>
Добре дошъл в AmoreClub
</div>

</div>

<div class="chat-input-area">

<input
class="chat-input"
id="chatInput"
placeholder="Напиши съобщение..."
>

<button class="send-btn">
Изпрати
</button>

</div>

</div>

</div>

</div>

<!-- LOGIN MODAL -->

<div id="loginModal" class="modal">

<div class="modal-content">

<h2>ВХОД</h2>

<input
type="email"
id="loginEmail"
placeholder="Email"
class="modal-input"
>

<input
type="password"
id="loginPassword"
placeholder="Password"
class="modal-input"
>

<button
class="modal-btn"
onclick="window.login()"
>
ВЛЕЗ
</button>

<button
class="close-btn"
onclick="closeLoginModal()"
>
ЗАТВОРИ
</button>

</div>

</div>

<!-- REGISTER MODAL -->

<div id="registerModal" class="modal">

<div class="modal-content">

<h2>РЕГИСТРАЦИЯ</h2>

<input
type="text"
id="registerNickname"
placeholder="Nickname"
class="modal-input"
>

<input
type="email"
id="registerEmail"
placeholder="Email"
class="modal-input"
>

<input
type="password"
id="registerPassword"
placeholder="Password"
class="modal-input"
>

<select
id="registerGender"
class="modal-input"
>
<option value="male">Мъж</option>
<option value="female">Жена</option>
</select>

<input
type="number"
id="registerBirthyear"
placeholder="Година на раждане"
class="modal-input"
>
<input
type="file"
id="registerAvatar"
class="modal-input"
accept="image/*"
>
<button
class="modal-btn"
onclick="window.register()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="close-btn"
onclick="closeRegisterModal()"
>
ЗАТВОРИ
</button>

</div>

</div>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<!-- FIREBASE -->

<script type="module">
const IMGBB_API_KEY =
"178ff20a25b96f23bcc53003fe3599cc";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
updateProfile,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
addDoc,
query,
orderBy,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBh4ffnfT-rncjtILTJcJmcvD7Zrzu9tYA",
authDomain: "amoreclub-2c978.firebaseapp.com",
projectId: "amoreclub-2c978",
storageBucket: "amoreclub-2c978.firebasestorage.app",
messagingSenderId: "732025669965",
appId: "1:732025669965:web:ce3f70fe0b7ab75ca34f04"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);
const socket =
io("https://amoreclub-server.onrender.com");

let isDancing = false;
/* CUSTOM MESSAGE */

window.showMessage = (text) => {

const alertBox =
document.getElementById("customAlert");

alertBox.innerText = text;

alertBox.style.display = "block";

setTimeout(() => {

alertBox.style.display = "none";

},3000);

};

/* REGISTER */

window.register = async () => {

const nickname =
document.getElementById("registerNickname").value;

const email =
document.getElementById("registerEmail").value;

const password =
document.getElementById("registerPassword").value;

const gender =
document.getElementById("registerGender").value;

const birthyear =
document.getElementById("registerBirthyear").value;
  
const avatarFile =
document.getElementById("registerAvatar").files[0];
if(!nickname || !email || !password){

showMessage("Попълни всички полета");

return;

}

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;

await updateProfile(user,{
displayName:nickname
});
let avatarUrl = "";

if(avatarFile){

const formData = new FormData();

formData.append(
"image",
avatarFile
);

const response =
await fetch(

`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,

{
method:"POST",
body:formData
}

);

const data =
await response.json();

avatarUrl =
data.data.display_url;

}
await setDoc(doc(db,"users",user.uid),{

nickname,
email,
gender,
birthyear,
createdAt:Date.now(),
avatar:avatarUrl,
album:[],
blockDanceInvites:false

});

closeRegisterModal();

showMessage("Регистрацията е успешна!");

}catch(error){

showMessage(error.message);

}

};

/* LOGIN */

window.login = async () => {

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

if(!email || !password){

showMessage("Попълни всички полета");

return;

}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

closeLoginModal();

showMessage("Успешен вход!");

}catch(error){

showMessage(error.message);

}

};

/* LOGOUT */

window.logout = async () => {

await signOut(auth);

showMessage("Излезе от профила");

};

/* AUTH STATE */

onAuthStateChanged(auth,(user)=>{

const authBox =
document.getElementById("authButtons");

if(user){

authBox.innerHTML = `

<button class="auth-btn">
${user.displayName}
</button>

<button
class="auth-btn"
onclick="window.logout()"
>
ИЗХОД
</button>

`;

}else{

authBox.innerHTML = `

<button
class="auth-btn"
onclick="window.openRegisterModal()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="auth-btn"
onclick="window.openLoginModal()"
>
ВХОД
</button>

`;

}

});

/* MODALS */

window.openLoginModal = () => {

document.getElementById(
"loginModal"
).style.display = "flex";

};

window.closeLoginModal = () => {

document.getElementById(
"loginModal"
).style.display = "none";

};

window.openRegisterModal = () => {

document.getElementById(
"registerModal"
).style.display = "flex";

};

window.closeRegisterModal = () => {

document.getElementById(
"registerModal"
).style.display = "none";

};
/* ENTER BUTTON SUPPORT */

/* LOGIN */

document
.getElementById("loginPassword")
.addEventListener("keydown",(e)=>{

if(e.key === "Enter"){

window.login();

}

});

/* REGISTER */

const registerInputs = [

"registerNickname",
"registerEmail",
"registerPassword",
"registerBirthyear"

];

registerInputs.forEach((id)=>{

document
.getElementById(id)
.addEventListener("keydown",(e)=>{

if(e.key === "Enter"){

window.register();

}

});

});
  /* CHAT ENTER */

document
.getElementById("chatInput")
.addEventListener("keydown",(e)=>{

if(e.key === "Enter"){

document.querySelector(".send-btn").click();

}

});
  /* CHAT SYSTEM */

const chatMessages =
document.getElementById("chatMessages");

window.sendMessage = async () => {

const input =
document.getElementById("chatInput");

const text = input.value.trim();

if(text === ""){
return;
}

if(!auth.currentUser){

showMessage("Трябва да си влязъл");

return;
}

const userRef = doc(
db,
"users",
auth.currentUser.uid
);

const userSnap =
await getDoc(userRef);

const userData =
userSnap.data();

await addDoc(collection(db,"chat"),{

user: auth.currentUser.displayName,

message: text,

avatar:
userData.avatar || "",

createdAt: Date.now()

});

input.value = "";

};

/* BUTTON */

document
.querySelector(".send-btn")
.addEventListener("click",()=>{

window.sendMessage();

});

/* REALTIME CHAT */

const q = query(
collection(db,"chat"),
orderBy("createdAt")
);

onSnapshot(q,(snapshot)=>{

chatMessages.innerHTML = "";

snapshot.forEach((doc)=>{

const data = doc.data();

chatMessages.innerHTML += `

<div style="
display:flex;
gap:10px;
align-items:flex-start;
margin-bottom:12px;
">

<img
src="${data.avatar || 'https://i.imgur.com/6VBx3io.png'}"
style="
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
border:2px solid #ff0077;
"
>

<div>

<div style="
color:#00e5ff;
font-weight:bold;
margin-bottom:4px;
">
${data.user}
</div>

<div style="
color:white;
word-break:break-word;
">
${data.message}
</div>

</div>

</div>

`;
});

chatMessages.scrollTop =
chatMessages.scrollHeight;

});
  /* DANCEFLOOR */

window.toggleDance = async () => {

if(!auth.currentUser){

showMessage("Трябва да си влязъл");

return;

}

const btn =
document.getElementById("danceBtn");

if(!isDancing){

await joinDancefloor();

btn.innerText =
"🛑 СПРИ ДА ТАНЦУВАШ";

isDancing = true;

}else{

socket.emit("leaveDancefloor");

btn.innerText =
"🕺 СКОЧИ НА ДАНСИНГА";

isDancing = false;

}

};
/* RECEIVE DANCERS */
socket.on("alreadyDancing",()=>{

isDancing = true;

const btn =
document.getElementById("danceBtn");

btn.innerText =
"🛑 СПРИ ДА ТАНЦУВАШ";

showMessage(
"Вече си на дансинга"
);

});
socket.on("dancefloorUpdate",(dancers)=>{

const dancefloor =
document.getElementById("dancefloor");

dancefloor.innerHTML = "";

dancers.forEach((dancer)=>{

const borderColor =
dancer.gender === "female"
? "#ff0077"
: "#00e5ff";

dancefloor.innerHTML += `

<div style="
position:absolute;
left:${dancer.x}%;
top:${dancer.y}%;

display:flex;
flex-direction:column;
align-items:center;

">

<img
src="${dancer.avatar}"
style="
width:70px;
height:70px;

border-radius:50%;

border:3px solid ${borderColor};

object-fit:cover;

box-shadow:
0 0 20px ${borderColor};

background:#111;
"
>

<div style="
margin-top:8px;
font-size:14px;
font-weight:bold;
color:white;

text-shadow:
0 0 10px ${borderColor};

">
${dancer.nickname}
</div>

</div>

`;

});

});
  window.joinDancefloor = async () => {

if(!auth.currentUser){
return;
}

const userRef = doc(
db,
"users",
auth.currentUser.uid
);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()){
return;
}

const userData =
userSnap.data();

const gender =
userData.gender || "male";

const avatar =
userData.avatar && userData.avatar !== ""
? userData.avatar
: (
gender === "female"
? "https://i.imgur.com/8Km9tLL.png"
: "https://i.imgur.com/6VBx3io.png"
);

socket.emit("joinDancefloor",{

nickname:
auth.currentUser.displayName,

gender:gender,

avatar:avatar

});

};
  /* YOUTUBE PLAYER */

let player;

let currentVideo = "qKjJeQCpbZk";

let videoStartedAt =
Date.now();

/* YOUTUBE READY */

/* YOUTUBE PLAYER */

let player;

let currentVideo = "";

let videoStartedAt = 0;

/* RECEIVE CURRENT MUSIC */

socket.on("currentMusic",(data)=>{

currentVideo = data.videoId;

videoStartedAt = data.startedAt;

if(player){

player.loadVideoById(currentVideo);

const currentTime = Math.floor(
(Date.now() - videoStartedAt) / 1000
);

player.seekTo(currentTime);

player.playVideo();

}

});

/* YOUTUBE READY */

window.onYouTubeIframeAPIReady = () => {

player = new YT.Player(
'youtubePlayer',
{

height:'60',
width:'700',

videoId:'',

playerVars:{
autoplay:1,
controls:0,
disablekb:1
},

events:{
onReady:onPlayerReady
}

});

};

function onPlayerReady(event){

if(currentVideo !== ""){

event.target.loadVideoById(
currentVideo
);

const currentTime = Math.floor(
(Date.now() - videoStartedAt) / 1000
);

event.target.seekTo(currentTime);

event.target.playVideo();

}

}

const currentTime = Math.floor(
(Date.now() - videoStartedAt) / 1000
);

event.target.seekTo(currentTime);

event.target.playVideo();

}
</script>
  <script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

window.onYouTubeIframeAPIReady = function(){

player = new YT.Player('youtubePlayer', {

height: '50',
width: '500',

videoId: 'jfKfPfyJRdk',

playerVars: {
'autoplay': 1,
'controls': 0,
'loop': 1,
'playlist': 'jfKfPfyJRdk'
},

events: {
'onReady': (event) => {

event.target.playVideo();

}
}

});

};

</script>
</body>
</html>
