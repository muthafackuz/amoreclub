<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmoreClub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0f;
color:white;
height:100vh;
overflow:hidden;
}

/* TOP DJ BAR */

.top-bar{
height:80px;
background:#111827;
border-bottom:2px solid #ff0077;

display:flex;
align-items:center;
justify-content:center;

position:relative;
}

.dj-player{
width:500px;
height:50px;

background:#18181f;

border:1px solid #333;
border-radius:12px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 15px;

box-shadow:
0 0 15px rgba(255,0,119,0.2);
}

.player-title{
color:#00e5ff;
font-weight:bold;
}

.player-controls{
display:flex;
gap:10px;
}

.player-btn{
background:#222;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.player-btn:hover{
background:#ff0077;
}

/* MAIN */

.main{
display:flex;
height:calc(100vh - 80px);
}

/* LEFT */

.left-panel{
width:40%;
padding:20px;
}

/* DANCEFLOOR */

.dancefloor-box{
height:100%;

background:#111827;

border-radius:18px;

border:1px solid #222;

padding:15px;

position:relative;

overflow:hidden;

box-shadow:
0 0 30px rgba(0,0,0,0.4);
}

.box-title{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
color:#ff0077;
}

.dancefloor{
height:90%;

background:
linear-gradient(45deg,#111 25%,#191919 25%,#191919 50%,#111 50%,#111 75%,#191919 75%,#191919);

background-size:40px 40px;

border-radius:15px;

position:relative;
overflow:hidden;
}

/* RIGHT */

.right-panel{
width:60%;
padding:20px;

display:flex;
flex-direction:column;
gap:20px;
}

/* AUTH */

.auth-box{
height:120px;

background:#111827;

border-radius:18px;

border:1px solid #222;

padding:15px;
}

.auth-buttons{
display:flex;
gap:15px;
margin-top:20px;
}

.auth-btn{
background:#1f2937;
border:none;
padding:12px 18px;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.auth-btn:hover{
background:#ff0077;
}

/* CHAT */

.chat-box{
flex:1;

background:#111827;

border-radius:18px;

border:1px solid #222;

padding:15px;

display:flex;
flex-direction:column;
}

.chat-messages{
flex:1;

background:#0d1117;

border-radius:12px;

padding:10px;

overflow-y:auto;

margin-bottom:15px;
}

.message{
margin-bottom:10px;
}

.message-user{
color:#00e5ff;
font-weight:bold;
}

.chat-input-area{
display:flex;
gap:10px;
}

.chat-input{
flex:1;

background:#1f2937;

border:none;

padding:12px;

border-radius:10px;

color:white;
}

.send-btn{
background:#ff0077;
border:none;
padding:12px 18px;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
/* MODALS */

.modal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.8);

justify-content:center;
align-items:center;

z-index:9999;

}

.modal-content{

width:400px;

background:#111827;

border-radius:20px;

padding:30px;

display:flex;
flex-direction:column;
gap:15px;

border:1px solid #333;

box-shadow:
0 0 30px rgba(255,0,119,0.3);

}

.modal-content h2{

color:#ff0077;
text-align:center;

}

.modal-input{

background:#1f2937;

border:none;

padding:14px;

border-radius:10px;

color:white;

font-size:16px;

}

.modal-btn{

background:#ff0077;

border:none;

padding:14px;

border-radius:10px;

color:white;

font-weight:bold;

cursor:pointer;

font-size:16px;

}

.close-btn{

background:#222;

border:none;

padding:12px;

border-radius:10px;

color:white;

cursor:pointer;

}
</style>
</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

<div class="dj-player">

<div class="player-title">
🎵 AMORECLUB DJ
</div>

<div class="player-controls">

<button class="player-btn">
▶
</button>

<button class="player-btn">
⏸
</button>

<button class="player-btn">
🔉
</button>

<button class="player-btn">
🔊
</button>

</div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="left-panel">

<div class="dancefloor-box">

<div class="box-title">
🕺 DANCEFLOOR
</div>

<div class="dancefloor">

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right-panel">

<!-- AUTH -->

<div class="auth-box">

<div class="box-title">
👤 PROFILE
</div>

<div class="auth-buttons" id="authButtons">

<button
class="auth-btn"
onclick="openRegisterModal()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="auth-btn"
onclick="openLoginModal()"
>
ВХОД
</button>

</div>

</div>

<!-- CHAT -->

<div class="chat-box">

<div class="box-title">
💬 CLUB CHAT
</div>

<div class="chat-messages">

<div class="message">
<span class="message-user">System:</span>
Добре дошъл в AmoreClub
</div>

</div>

<div class="chat-input-area">

<input
class="chat-input"
placeholder="Напиши съобщение..."
>

<button class="send-btn">
Изпрати
</button>

</div>

</div>

</div>

</div>
<!-- FIREBASE LOGIN SYSTEM -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
updateProfile,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBh4ffnfT-rncjtILTJcJmcvD7Zrzu9tYA",
  authDomain: "amoreclub-2c978.firebaseapp.com",
  projectId: "amoreclub-2c978",
  storageBucket: "amoreclub-2c978.firebasestorage.app",
  messagingSenderId: "732025669965",
  appId: "1:732025669965:web:ce3f70fe0b7ab75ca34f04"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.register = async function(){

const nickname =
document.getElementById("registerNickname").value;

const email =
document.getElementById("registerEmail").value;

const password =
document.getElementById("registerPassword").value;

const gender =
document.getElementById("registerGender").value;

const birthyear =
document.getElementById("registerBirthyear").value;

if(!nickname || !email || !password){
alert("Попълни всички полета");
return;
}

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;

await updateProfile(user,{
displayName:nickname
});

await setDoc(doc(db,"users",user.uid),{

nickname:nickname,
email:email,
gender:gender,
birthyear:birthyear,
createdAt:Date.now(),
avatar:"",
album:[],
blockDanceInvites:false

});

alert("Регистрацията е успешна!");

closeRegisterModal();

location.reload();

}catch(error){

alert(error.message);

}

}

window.login = async function(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

if(!email || !password){
return;
}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Успешен вход!");

closeLoginModal();

location.reload();

}catch(error){

alert(error.message);

}

}

window.logout = async function(){

await signOut(auth);

location.reload();

}

onAuthStateChanged(auth,(user)=>{

const authBox =
document.querySelector(".auth-buttons");

if(user){

authBox.innerHTML = `

<button class="auth-btn">
${user.displayName}
</button>

<button
class="auth-btn"
onclick="window.logout()"
>
ИЗХОД
</button>

`;

}else{

authBox.innerHTML = `

<button
class="auth-btn"
onclick="window.openRegisterModal()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="auth-btn"
onclick="window.openLoginModal()"
>
ВХОД
</button>

`;

}

});
window.openLoginModal = function(){

document.getElementById(
"loginModal"
).style.display = "flex";

}

window.closeLoginModal = function(){

document.getElementById(
"loginModal"
).style.display = "none";

}

window.openRegisterModal = function(){

document.getElementById(
"registerModal"
).style.display = "flex";

}

window.closeRegisterModal = function(){

document.getElementById(
"registerModal"
).style.display = "none";

}
</script>
  <!-- LOGIN MODAL -->

<div id="loginModal" class="modal">

<div class="modal-content">

<h2>ВХОД</h2>

<input
type="email"
id="loginEmail"
placeholder="Email"
class="modal-input"
>

<input
type="password"
id="loginPassword"
placeholder="Password"
class="modal-input"
>

<button
class="modal-btn"
onclick="window.login()"
>
ВЛЕЗ
</button>

<button
class="close-btn"
onclick="closeLoginModal()"
>
ЗАТВОРИ
</button>

</div>

</div>

<!-- REGISTER MODAL -->

<div id="registerModal" class="modal">

<div class="modal-content">

<h2>РЕГИСТРАЦИЯ</h2>

<input
type="text"
id="registerNickname"
placeholder="Nickname"
class="modal-input"
>

<input
type="email"
id="registerEmail"
placeholder="Email"
class="modal-input"
>

<input
type="password"
id="registerPassword"
placeholder="Password"
class="modal-input"
>

<select
id="registerGender"
class="modal-input"
>
<option value="male">Мъж</option>
<option value="female">Жена</option>
</select>

<input
type="number"
id="registerBirthyear"
placeholder="Година на раждане"
class="modal-input"
>

<button
class="modal-btn"
onclick="window.register()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="close-btn"
onclick="closeRegisterModal()"
>
ЗАТВОРИ
</button>

</div>

</div>
</body>
</html>
