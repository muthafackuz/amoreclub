<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmoreClub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0f;
color:white;
height:100vh;
overflow:hidden;
}

.top-bar{
height:80px;
background:#111827;
border-bottom:2px solid #ff0077;
display:flex;
align-items:center;
justify-content:center;
}

.dj-player{
width:700px;
height:60px;
background:#18181f;
border:1px solid #333;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,0,119,0.2);
}

.main{
display:flex;
height:calc(100vh - 80px);
}

.left-panel{
width:40%;
padding:20px;
}

.right-panel{
width:60%;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.dancefloor-box,
.auth-box,
.chat-box{
background:#111827;
border-radius:18px;
border:1px solid #222;
padding:15px;
}

.dancefloor-box{
height:100%;
}

.box-title{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
color:#ff0077;
}

.dancefloor{
height:90%;
background:
linear-gradient(
45deg,
#111 25%,
#191919 25%,
#191919 50%,
#111 50%,
#111 75%,
#191919 75%,
#191919
);
background-size:40px 40px;
border-radius:15px;
position:relative;
overflow:hidden;
}

.auth-buttons{
display:flex;
gap:15px;
margin-top:20px;
}

.auth-btn{
background:#1f2937;
border:none;
padding:12px 18px;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.chat-box{
flex:1;
display:flex;
flex-direction:column;
}

.chat-messages{
flex:1;
background:#0d1117;
border-radius:12px;
padding:10px;
overflow-y:auto;
margin-bottom:15px;
}

.chat-input-area{
display:flex;
gap:10px;
}

.chat-input{
flex:1;
background:#1f2937;
border:none;
padding:12px;
border-radius:10px;
color:white;
}

.send-btn{
background:#ff0077;
border:none;
padding:12px 18px;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
width:400px;
background:#111827;
border-radius:20px;
padding:30px;
display:flex;
flex-direction:column;
gap:15px;
border:1px solid #333;
}

.modal-input{
background:#1f2937;
border:none;
padding:14px;
border-radius:10px;
color:white;
}

.modal-btn,
.close-btn{
border:none;
padding:14px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:bold;
}

.modal-btn{
background:#ff0077;
}

.close-btn{
background:#222;
}

.custom-alert{
position:fixed;
top:20px;
right:20px;
background:#111827;
border:1px solid #ff0077;
padding:15px 20px;
border-radius:12px;
z-index:99999;
font-weight:bold;
display:none;
}

</style>
</head>

<body>

<div id="customAlert" class="custom-alert"></div>

<div class="top-bar">
<div class="dj-player">
<div id="youtubePlayer"></div>
</div>
</div>

<div class="main">

<div class="left-panel">

<div class="dancefloor-box">

<div class="box-title">
🕺 DANCEFLOOR
</div>

<button
class="auth-btn"
id="danceBtn"
style="margin-bottom:15px;"
>
🕺 СКОЧИ НА ДАНСИНГА
</button>

<div class="dancefloor" id="dancefloor"></div>

</div>

</div>

<div class="right-panel">

<div class="auth-box">

<div class="box-title">
👤 PROFILE
</div>

<div class="auth-buttons" id="authButtons">

<button
class="auth-btn"
onclick="openRegisterModal()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="auth-btn"
onclick="openLoginModal()"
>
ВХОД
</button>

</div>

</div>

<div class="chat-box">

<div class="box-title">
💬 CLUB CHAT
</div>

<div class="chat-messages" id="chatMessages"></div>

<div class="chat-input-area">

<input
class="chat-input"
id="chatInput"
placeholder="Напиши съобщение..."
>

<button class="send-btn" id="sendBtn">
Изпрати
</button>

</div>

</div>

</div>

</div>

<div id="loginModal" class="modal">

<div class="modal-content">

<h2>ВХОД</h2>

<input
type="email"
id="loginEmail"
placeholder="Email"
class="modal-input"
>

<input
type="password"
id="loginPassword"
placeholder="Password"
class="modal-input"
>

<button
class="modal-btn"
onclick="window.login()"
>
ВЛЕЗ
</button>

<button
class="close-btn"
onclick="closeLoginModal()"
>
ЗАТВОРИ
</button>

</div>

</div>

<div id="registerModal" class="modal">

<div class="modal-content">

<h2>РЕГИСТРАЦИЯ</h2>

<input
type="text"
id="registerNickname"
placeholder="Nickname"
class="modal-input"
>

<input
type="email"
id="registerEmail"
placeholder="Email"
class="modal-input"
>

<input
type="password"
id="registerPassword"
placeholder="Password"
class="modal-input"
>

<select
id="registerGender"
class="modal-input"
>
<option value="male">Мъж</option>
<option value="female">Жена</option>
</select>

<input
type="number"
id="registerBirthyear"
placeholder="Година на раждане"
class="modal-input"
>

<input
type="file"
id="registerAvatar"
class="modal-input"
accept="image/*"
>

<button
class="modal-btn"
onclick="window.register()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="close-btn"
onclick="closeRegisterModal()"
>
ЗАТВОРИ
</button>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
updateProfile,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBh4ffnfT-rncjtILTJcJmcvD7Zrzu9tYA",
authDomain: "amoreclub-2c978.firebaseapp.com",
projectId: "amoreclub-2c978",
storageBucket: "amoreclub-2c978.firebasestorage.app",
messagingSenderId: "732025669965",
appId: "1:732025669965:web:ce3f70fe0b7ab75ca34f04"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const socket =
io("https://amoreclub-server.onrender.com");

let ytPlayer;

window.showMessage = (text) => {

const alertBox =
document.getElementById("customAlert");

alertBox.innerText = text;

alertBox.style.display = "block";

setTimeout(()=>{

alertBox.style.display = "none";

},3000);

};

window.openLoginModal = () => {

document.getElementById(
"loginModal"
).style.display = "flex";

};

window.closeLoginModal = () => {

document.getElementById(
"loginModal"
).style.display = "none";

};

window.openRegisterModal = () => {

document.getElementById(
"registerModal"
).style.display = "flex";

};

window.closeRegisterModal = () => {

document.getElementById(
"registerModal"
).style.display = "none";

};

window.register = async () => {

const nickname =
document.getElementById("registerNickname").value;

const email =
document.getElementById("registerEmail").value;

const password =
document.getElementById("registerPassword").value;

if(!nickname || !email || !password){

showMessage("Попълни всички полета");
return;

}

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

await updateProfile(
userCredential.user,
{
displayName:nickname
}
);

closeRegisterModal();

showMessage("Успешна регистрация");

}catch(error){

showMessage(error.message);

}

};

window.login = async () => {

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

closeLoginModal();

showMessage("Успешен вход");

}catch(error){

showMessage(error.message);

}

};

window.logout = async () => {

await signOut(auth);

showMessage("Излезе");

};

onAuthStateChanged(auth,(user)=>{

const authBox =
document.getElementById("authButtons");

if(user){

authBox.innerHTML = `

<button class="auth-btn">
${user.displayName}
</button>

<button
class="auth-btn"
onclick="window.logout()"
>
ИЗХОД
</button>

`;

}else{

authBox.innerHTML = `

<button
class="auth-btn"
onclick="window.openRegisterModal()"
>
РЕГИСТРАЦИЯ
</button>

<button
class="auth-btn"
onclick="window.openLoginModal()"
>
ВХОД
</button>

`;

}

});

document
.getElementById("loginPassword")
.addEventListener("keydown",(e)=>{

if(e.key === "Enter"){

window.login();

}

});

document
.getElementById("chatInput")
.addEventListener("keydown",(e)=>{

if(e.key === "Enter"){

document
.getElementById("sendBtn")
.click();

}

});

window.onYouTubeIframeAPIReady = () => {

ytPlayer = new YT.Player(
'youtubePlayer',
{
height:'60',
width:'700',
videoId:'jfKfPfyJRdk',
playerVars:{
autoplay:1,
controls:0
}
}
);

};

</script>

</body>
</html>
